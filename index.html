<title>Mon parcours IA — CPF RS7311</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;background:linear-gradient(160deg,#f0ebfa 0%,#fef6ed 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
.wrap{width:100%;max-width:420px;text-align:center}
.logo{width:88px;height:88px;border-radius:22px;overflow:hidden;margin:0 auto 20px;box-shadow:0 8px 32px rgba(107,63,160,.25)}
.logo img{width:100%;height:100%;object-fit:cover}
h1{font-size:26px;font-weight:800;color:#1A1A2E;margin-bottom:6px}
.sub{font-size:14px;color:#6B7280;margin-bottom:36px;line-height:1.5}
.choice{background:white;border-radius:18px;padding:24px;box-shadow:0 4px 24px rgba(26,26,46,.08);margin-bottom:14px;cursor:pointer;transition:all .2s;border:2px solid transparent;text-align:left;display:flex;align-items:center;gap:16px;text-decoration:none}
.choice:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(107,63,160,.15);border-color:#6B3FA0}
.choice-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.choice-icon.app{background:linear-gradient(135deg,#6B3FA0,#F5820A)}
.choice-icon.form{background:#1A1A2E}
.choice-icon svg{width:26px;height:26px;color:white}
.choice-text h2{font-size:16px;font-weight:700;color:#1A1A2E;margin-bottom:3px}
.choice-text p{font-size:12px;color:#6B7280}
.choice-arrow{margin-left:auto;color:#9CA3AF}
.footer{margin-top:32px;font-size:12px;color:#9CA3AF;font-weight:500}
.footer strong{color:#6B3FA0;font-weight:700}

/* Modal code formateur */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,26,46,.5);z-index:100;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:white;border-radius:18px;padding:28px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h3{font-size:18px;font-weight:800;color:#1A1A2E;margin-bottom:6px}
.modal p{font-size:13px;color:#6B7280;margin-bottom:20px}
.modal input{width:100%;padding:13px 15px;border:2px solid #E8EAF0;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;text-align:center;letter-spacing:2px;margin-bottom:14px;transition:border-color .2s}
.modal input:focus{outline:none;border-color:#6B3FA0}
.modal-btns{display:flex;gap:8px}
.mbtn{flex:1;padding:13px;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none}
.mbtn-cancel{background:#F7F8FC;color:#6B7280}
.mbtn-go{background:linear-gradient(135deg,#6B3FA0,#F5820A);color:white}
.modal-err{color:#EF4444;font-size:12px;font-weight:600;margin-bottom:10px;min-height:16px}
</style>
</head>
